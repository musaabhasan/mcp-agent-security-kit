name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python files
        run: python -m compileall src tests

      - name: Generate SARIF smoke report
        run: python -m mcp_agent_security_kit.audit examples/mcp-config-risky.json --format sarif --output reports/mcp-audit.sarif

      - name: Run high-severity audit gate on safer example
        run: python -m mcp_agent_security_kit.audit examples/mcp-config-safer.json --fail-on high
